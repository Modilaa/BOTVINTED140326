<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dils le Scraper</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e4e6ed;
    --text2: #8b90a0;
    --accent: #6c5ce7;
    --green: #00b894;
    --red: #e17055;
    --orange: #fdcb6e;
    --blue: #74b9ff;
    --purple: #a29bfe;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Username banner */
  .username-banner {
    background: linear-gradient(135deg, rgba(108, 92, 231, 0.15) 0%, rgba(162, 155, 254, 0.1) 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
  }
  .username-banner.hidden {
    display: none;
  }
  .username-input-group {
    display: flex;
    gap: 8px;
    flex: 1;
    max-width: 400px;
  }
  .username-input-group input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
  }
  .username-input-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .username-input-group button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }
  .username-input-group button:hover {
    opacity: 0.9;
  }
  .username-display {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .last-scan { font-size: 12px; color: var(--text2); }
  .refresh-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .refresh-btn:hover { opacity: 0.9; }

  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-label { font-size: 11px; text-transform: uppercase; color: var(--text2); letter-spacing: 0.5px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.blue { color: var(--blue); }

  .filters {
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-search {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    width: 220px;
    margin-left: auto;
  }
  .filter-search::placeholder { color: var(--text2); }

  .tabs {
    display: flex;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 16px 24px; }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 8px 16px rgba(108, 92, 231, 0.1); }
  .card.opportunity { border-left: 4px solid var(--green); }
  .card.rejected { border-left: 4px solid var(--orange); }
  .card.no-match { border-left: 4px solid var(--text2); }

  .card-top {
    display: flex;
    gap: 12px;
    padding: 14px;
  }
  .card-img {
    width: 90px;
    height: 90px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-green { background: rgba(0,184,148,0.15); color: var(--green); }
  .badge-red { background: rgba(225,112,85,0.15); color: var(--red); }
  .badge-orange { background: rgba(253,203,110,0.15); color: var(--orange); }
  .badge-blue { background: rgba(116,185,255,0.15); color: var(--blue); }
  .badge-gray { background: rgba(139,144,160,0.15); color: var(--text2); }
  .badge-purple { background: rgba(162,155,254,0.15); color: var(--purple); }

  .card-links {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(116, 185, 255, 0.1);
    color: var(--blue);
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
  }
  .link-btn:hover { background: rgba(116, 185, 255, 0.2); }
  .link-btn.purple {
    background: rgba(162, 155, 254, 0.1);
    color: var(--purple);
  }
  .link-btn.purple:hover {
    background: rgba(162, 155, 254, 0.2);
  }

  .card-prices {
    display: flex;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--surface2);
    font-size: 12px;
    flex-wrap: wrap;
    gap: 8px;
    border-top: 1px solid var(--border);
  }
  .price-col { flex: 1; min-width: 90px; text-align: center; }
  .price-label { color: var(--text2); font-size: 10px; margin-bottom: 2px; }
  .price-value { font-weight: 700; font-size: 14px; }

  /* Match details */
  .card-matches {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  .match-title { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; }
  .match-item {
    display: flex;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(46,51,69,0.5);
    align-items: flex-start;
  }
  .match-item:last-child { border-bottom: none; }
  .match-img {
    width: 45px;
    height: 45px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .match-info { flex: 1; min-width: 0; }
  .match-info-title {
    font-size: 11px;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 3px;
  }
  .match-info-meta {
    font-size: 10px;
    color: var(--text2);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .match-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: rgba(116, 185, 255, 0.1);
    color: var(--blue);
    border: none;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
  }
  .match-link-btn:hover {
    background: rgba(116, 185, 255, 0.2);
  }

  .score-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .confidence {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 9px;
    font-weight: 600;
  }
  .confidence-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }
  .confidence-high .confidence-dot { background: var(--green); }
  .confidence-medium .confidence-dot { background: var(--orange); }
  .confidence-low .confidence-dot { background: var(--red); }
  .confidence-unknown .confidence-dot { background: var(--text2); }

  /* Claim button and state */
  .card-claim {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .claim-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green) 0%, #00a86b 100%);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .claim-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3); }
  .claim-btn:active { transform: translateY(0); }

  .claimed-badge {
    width: 100%;
    background: linear-gradient(135deg, var(--red) 0%, #d24141 100%);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: default;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .claimed-by {
    display: block;
    margin-bottom: 4px;
  }
  .claimed-user { font-weight: 700; color: #fff; }
  .claimed-time { font-size: 10px; opacity: 0.9; }

  /* Table view */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:hover td { background: rgba(108,92,231,0.05); }

  .no-data {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    font-size: 14px;
  }
  .no-data-icon { font-size: 40px; margin-bottom: 12px; }

  /* ===== MOBILE RESPONSIVE ===== */
  @media (max-width: 768px) {
    /* Username banner compact */
    .username-banner { padding: 8px 12px; }
    .username-input-group { max-width: 100%; }
    .username-input-group input { font-size: 14px; padding: 10px 12px; }
    .username-input-group button { padding: 10px 14px; font-size: 13px; }

    /* Header stacked */
    .header {
      padding: 10px 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header h1 { font-size: 16px; }
    .header-right {
      gap: 8px;
      width: 100%;
      justify-content: space-between;
    }
    .refresh-btn {
      padding: 8px 14px;
      font-size: 12px;
      min-height: 36px;
    }

    /* Stats bar as 3-col grid */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px 14px;
    }
    .stat { align-items: center; text-align: center; }
    .stat-label { font-size: 9px; }
    .stat-value { font-size: 16px; }

    /* Filters: horizontal scroll */
    .filters {
      padding: 8px 14px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      gap: 6px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 8px 12px;
      font-size: 12px;
      white-space: nowrap;
      min-height: 36px;
    }
    .filter-search {
      width: 100%;
      min-width: 140px;
      margin-left: 0;
      flex-shrink: 0;
      font-size: 14px;
      padding: 8px 12px;
      min-height: 36px;
    }

    /* Tabs compact */
    .tabs {
      padding: 0 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 10px 14px;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Content area */
    .content { padding: 10px; }

    /* Cards full-width */
    .cards-grid {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    /* Card top: smaller image */
    .card-top { padding: 10px; gap: 10px; }
    .card-img { width: 70px; height: 70px; }
    .card-title { font-size: 12px; }
    .card-meta { font-size: 10px; gap: 4px; }
    .card-links { gap: 4px; margin-top: 6px; }
    .link-btn { padding: 6px 10px; font-size: 11px; min-height: 30px; }

    /* Prices as 2x2 grid */
    .card-prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 10px;
    }
    .price-col { min-width: auto; text-align: center; }
    .price-label { font-size: 9px; }
    .price-value { font-size: 13px; }

    /* Match details compact */
    .card-matches { padding: 8px 10px; max-height: 180px; }
    .match-item { gap: 6px; padding: 6px 0; }
    .match-img { width: 38px; height: 38px; }
    .match-info-title { font-size: 10px; }
    .match-info-meta { font-size: 9px; gap: 4px; }
    .match-link-btn { padding: 3px 8px; font-size: 9px; min-height: 24px; }

    /* Claim button touch-friendly */
    .card-claim { padding: 8px 10px; }
    .claim-btn {
      padding: 12px 16px;
      font-size: 14px;
      min-height: 44px;
      border-radius: 8px;
    }
    .claimed-badge {
      padding: 12px 16px;
      font-size: 13px;
      min-height: 44px;
      border-radius: 8px;
    }

    /* No data screen */
    .no-data { padding: 40px 20px; }
    .no-data-icon { font-size: 32px; }
  }

  /* Stale cards (from previous scans) */
  .card.stale { opacity: 0.7; border-left: 4px solid var(--text2); }
  .stale-badge { font-size: 10px; color: var(--text2); font-style: italic; }
  .dismiss-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    margin-left: auto;
  }
  .dismiss-btn:hover { border-color: var(--red); color: var(--red); }

  /* Underpriced cards */
  .card.underpriced { border-left: 4px solid var(--red); }
  .underpriced-discount {
    font-size: 22px;
    font-weight: 800;
    color: var(--red);
    white-space: nowrap;
  }
  .underpriced-vs {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }
  .underpriced-stats {
    display: flex;
    gap: 16px;
    padding: 12px 14px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .underpriced-stat {
    flex: 1;
    min-width: 80px;
    text-align: center;
  }
  .underpriced-stat-label {
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 2px;
  }
  .underpriced-stat-value {
    font-size: 14px;
    font-weight: 700;
  }

  /* Small phones */
  @media (max-width: 380px) {
    .header h1 { font-size: 14px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .card-img { width: 56px; height: 56px; }
    .card-prices { grid-template-columns: 1fr 1fr; }
    .price-value { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="username-banner" id="usernameBanner">
  <div id="usernameInput" class="username-input-group">
    <input type="text" id="usernameField" placeholder="Votre pseudo..." maxlength="32">
    <button onclick="saveUsername()">Enregistrer</button>
  </div>
  <div id="usernameDisplay" class="username-display" style="display:none;">
    <span>Connecté en tant que:</span>
    <span id="usernameValue"></span>
  </div>
</div>

<div class="header">
  <h1><span>Dils</span> le Scraper</h1>
  <div class="header-right">
    <span class="last-scan" id="lastScan"></span>
    <button class="refresh-btn" onclick="loadData()">Actualiser</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="filters" id="filtersBar">
  <button class="filter-btn" data-filter="all">Tout</button>
  <button class="filter-btn active" data-filter="with-matches">Avec matches</button>
  <button class="filter-btn" data-filter="opportunities">Opportunités</button>
  <button class="filter-btn" data-filter="no-match">Sans match</button>
  <button class="filter-btn" data-filter="rejected">Rejetés</button>
  <button class="filter-btn" data-filter="claimed">Prises</button>
  <input type="text" class="filter-search" id="searchInput" placeholder="Rechercher un titre...">
</div>
<div class="filters" id="categoryBar" style="padding-top:0"></div>

<div class="tabs">
  <div class="tab active" data-view="cards">Cartes</div>
  <div class="tab" data-view="underpriced">Sous-évalués</div>
  <div class="tab" data-view="table">Tableau</div>
  <div class="tab" data-view="config">Config</div>
</div>

<div class="content" id="mainContent"></div>

<script>
let scanData = null;
let currentFilter = 'with-matches';
let currentCategory = 'all';
let currentView = 'cards';
let searchQuery = '';
let username = '';
let claims = {};
let eventSource = null;

// Auto-detect base path (works behind /dashboard/ reverse proxy or standalone)
const BASE = window.location.pathname.replace(/\/$/, '');

// Initialize username
function initUsername() {
  username = localStorage.getItem('botvintedcodex_username') || '';
  if (username) {
    document.getElementById('usernameInput').style.display = 'none';
    document.getElementById('usernameDisplay').style.display = 'flex';
    document.getElementById('usernameValue').textContent = username;
    document.getElementById('usernameBanner').classList.remove('hidden');
  } else {
    document.getElementById('usernameInput').style.display = 'flex';
    document.getElementById('usernameDisplay').style.display = 'none';
    document.getElementById('usernameBanner').classList.remove('hidden');
  }
}

function saveUsername() {
  const input = document.getElementById('usernameField');
  const val = input.value.trim();
  if (!val) return;
  localStorage.setItem('botvintedcodex_username', val);
  username = val;
  initUsername();
  render();
}

// Allow Enter key to save
document.getElementById('usernameField')?.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') saveUsername();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Tab buttons
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.toLowerCase();
  render();
});

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function formatEur(val) {
  if (val === null || val === undefined) return '—';
  return val.toFixed(2) + ' €';
}

function getListingStatus(row) {
  if (row.profit && row.profit.profit >= scanData.thresholds.minProfitEur &&
      row.profit.profitPercent >= scanData.thresholds.minProfitPercent) {
    return 'opportunity';
  }
  if (row.matchedSales && row.matchedSales.length > 0) {
    return 'rejected';
  }
  return 'no-match';
}

function renderCategoryButtons() {
  if (!scanData || !scanData.searchedListings) return;
  const categories = [...new Set(scanData.searchedListings.map(r => r.search))];
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = `<button class="filter-btn ${currentCategory === 'all' ? 'active' : ''}" data-cat="all">Toutes</button>` +
    categories.map(cat => {
      const count = scanData.searchedListings.filter(r => r.search === cat).length;
      return `<button class="filter-btn ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${cat} (${count})</button>`;
    }).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = btn.dataset.cat;
      render();
    });
  });
}

function filterListings(listings) {
  return listings.filter(row => {
    if (currentCategory !== 'all' && row.search !== currentCategory) return false;
    const status = getListingStatus(row);
    const isClaimed = claims[row.itemKey];
    const hasMatches = row.matchedSales && row.matchedSales.length > 0;

    if (currentFilter === 'all') {
      // show all
    } else if (currentFilter === 'with-matches') {
      if (!hasMatches) return false;
    } else if (currentFilter === 'claimed') {
      if (!isClaimed) return false;
    } else if (currentFilter === 'opportunities') {
      if (status !== 'opportunity') return false;
    } else if (currentFilter === 'no-match') {
      if (status !== 'no-match') return false;
    } else if (currentFilter === 'rejected') {
      if (status !== 'rejected') return false;
    }

    if (searchQuery && !row.title.toLowerCase().includes(searchQuery) &&
        !(row.rawTitle || '').toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

function scoreColor(score) {
  if (score >= 15) return 'var(--green)';
  if (score >= 10) return 'var(--orange)';
  return 'var(--red)';
}

function scoreWidth(score) {
  return Math.min(100, (score / 25) * 100);
}

function renderStats() {
  if (!scanData) return;
  const opps = scanData.opportunities || [];
  const all = scanData.searchedListings || [];
  const underpricedCount = (scanData.underpricedAlerts || []).length;
  const withMatches = all.filter(r => r.matchedSales && r.matchedSales.length > 0);
  const claimed = all.filter(r => claims[r.itemKey]);
  const avgProfit = opps.length > 0
    ? opps.reduce((s, o) => s + (o.profit?.profit || 0), 0) / opps.length
    : 0;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat">
      <span class="stat-label">Annonces scannées</span>
      <span class="stat-value blue">${all.length}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Opportunités</span>
      <span class="stat-value green">${opps.length}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Sous-évalués</span>
      <span class="stat-value red">${underpricedCount}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Avec matches</span>
      <span class="stat-value orange">${withMatches.length}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Prises</span>
      <span class="stat-value purple">${claimed.length}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Profit moyen</span>
      <span class="stat-value green">${formatEur(avgProfit)}</span>
    </div>
  `;
}

function extractItemKey(url) {
  // Extract ID from Vinted URL: https://www.vinted.fr/items/1234567890-...
  const match = url.match(/\/items\/(\d+)/);
  return match ? match[1] : url;
}

async function dismissItem(itemKey) {
  if (!confirm('Retirer cette carte du dashboard ?')) return;
  try {
    const response = await fetch(BASE + '/api/listing/' + encodeURIComponent(itemKey), { method: 'DELETE' });
    if (response.ok) {
      loadData();
    } else {
      alert('Erreur lors de la suppression.');
    }
  } catch (e) {
    console.error('Dismiss error:', e);
  }
}

async function claimItem(itemKey, vintedUrl) {
  if (!username) {
    alert('Veuillez d\'abord entrer votre pseudo.');
    document.getElementById('usernameField').focus();
    return;
  }

  try {
    const response = await fetch(BASE + '/api/claim', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        itemKey: itemKey,
        username: username,
        vintedUrl: vintedUrl
      })
    });

    if (response.ok) {
      const result = await response.json();
      claims[itemKey] = {
        username: username,
        claimedAt: new Date().toISOString()
      };
      render();
    } else {
      alert('Erreur lors de la prise de l\'annonce.');
    }
  } catch (e) {
    console.error('Claim error:', e);
    alert('Erreur de connexion au serveur.');
  }
}

function render() {
  if (!scanData) {
    document.getElementById('mainContent').innerHTML =
      '<div class="no-data"><div class="no-data-icon">⏳</div>Chargement des données...</div>';
    return;
  }

  renderStats();
  renderCategoryButtons();

  const content = document.getElementById('mainContent');

  if (currentView === 'config') {
    content.innerHTML = renderConfigView();
    loadConfig();
    return;
  }

  if (currentView === 'underpriced') {
    content.innerHTML = renderUnderpricedView();
    return;
  }

  // Reverse order: latest scanned first
  const allListings = [...(scanData.searchedListings || [])].reverse();
  const filtered = filterListings(allListings);

  if (currentView === 'cards') {
    content.innerHTML = renderCardView(filtered);
  } else {
    content.innerHTML = renderTableView(filtered);
  }
}

async function loadData() {
  try {
    const res = await fetch(BASE + '/api/scan');
    scanData = await res.json();
    if (scanData.error) {
      document.getElementById('mainContent').innerHTML =
        `<div class="no-data"><div class="no-data-icon">⚠️</div>${scanData.error}</div>`;
      return;
    }

    // Attach itemKey to each listing
    if (scanData.searchedListings) {
      scanData.searchedListings.forEach(row => {
        if (!row.itemKey) {
          row.itemKey = extractItemKey(row.url);
        }
      });
    }

    document.getElementById('lastScan').textContent = `Dernier scan: ${formatDateTime(scanData.scannedAt)}`;
    render();
  } catch (e) {
    console.error('Load error:', e);
    document.getElementById('mainContent').innerHTML =
      `<div class="no-data"><div class="no-data-icon">❌</div>Erreur de connexion au serveur.</div>`;
  }
}

function connectSSE() {
  if (eventSource) eventSource.close();

  eventSource = new EventSource(BASE + '/api/events');

  eventSource.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'scan-update') {
        // New scan results available — reload immediately
        loadData();
        loadClaims();
      } else if (msg.type === 'claim' && msg.data) {
        // Server sends: {type:'claim', data:{username, vintedUrl, claimedAt}}
        // We need itemKey — reload all claims to be safe
        loadClaims().then(() => render());
      } else if (msg.type === 'unclaim' && msg.data) {
        delete claims[msg.data.itemKey];
        render();
      }
    } catch (err) {
      console.error('SSE parse error:', err);
    }
  };

  eventSource.onerror = () => {
    console.log('SSE disconnected, reconnecting in 3s...');
    setTimeout(connectSSE, 3000);
  };
}

// Initialize
initUsername();
loadData();
loadClaims();
connectSSE();

// Auto-refresh every 2 minutes
setInterval(loadData, 120000);
</script>
